    async function apiFetch(path, options = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

      useEffect(() => {

        if (!token) { setLoading(false); return; }
        apiFetch('/api/auth/me')

          .catch(() => setToken(null))
          .finally(() => setLoading(false));
      }, []);

      const login = useCallback(async (email, password) => {
        const data = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        setToken(data.token);
        setUser(data.user);
        return data.user;
      }, []);

      const register = useCallback(async (email, password) => {
        const data = await apiFetch('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        setToken(data.token);
        setUser(data.user);
        return data.user;
      }, []);

      const logout = useCallback(() => {
        setToken(null);
        setUser(null);
      }, []);

      return (
        <AuthContext.Provider value={{ user, login, register, logout, loading }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function PurchaseProvider({ children }) {
      // 서버(GET /api/purchases)에서 가져옴. 로그인 상태가 바뀌면 다시 fetch.
      const { user } = useContext(AuthContext) || {};
      const [purchases, setPurchases] = useState([]);
      const [loading, setLoading] = useState(false);

      const refresh = useCallback(async () => {
        if (!getToken()) {
          setPurchases([]);
          return;
        }
        setLoading(true);
        try {
          const data = await apiFetch('/api/purchases');
          // 서버 응답: { purchases: [{ id, content_id, amount, paid_at, order_id, title, ticker, category }] }
          // 프론트 일관성: contentId(camelCase)도 함께 노출
          const normalized = (data.purchases || []).map((p) => ({
            ...p,
            contentId: p.content_id,
            price: p.amount,
            purchasedAt: p.paid_at,
            orderId: p.order_id,
          }));
          setPurchases(normalized);
        } catch (e) {
          console.warn('purchases fetch failed:', e);
          setPurchases([]);
        } finally {
          setLoading(false);
        }
      }, []);

      // 로그인 상태 변화 시 자동 refresh
      useEffect(() => { refresh(); }, [user, refresh]);

      const isPurchased = useCallback(
        (contentId) => purchases.some((p) => p.contentId === contentId),
        [purchases]
      );

      return (
        <PurchaseContext.Provider value={{ purchases, isPurchased, refresh, loading }}>
          {children}
        </PurchaseContext.Provider>
      );
    }

    // ========================================
    // 🔀 Router (hash-based)
    // ========================================
    const RouterContext = createContext(null);

    function matchRoute(pattern, path) {
      const pSeg = pattern.split('/').filter(Boolean);
      const aSeg = path.split('/').filter(Boolean);
      if (pSeg.length !== aSeg.length) return null;
      const params = {};
      for (let i = 0; i < pSeg.length; i++) {
        if (pSeg[i].startsWith(':')) {
          params[pSeg[i].slice(1)] = decodeURIComponent(aSeg[i]);
        } else if (pSeg[i] !== aSeg[i]) {
          return null;
        }
      }
      return params;
    }

    function Router({ children }) {
      const getPath = () => {
        // 1) hash가 있으면 hash 기반 (#/foo) 가 우선
        const h = window.location.hash;
        if (h && h.length > 1) {
          return h.replace(/^#/, '') || '/';
        }
        // 2) hash가 없으면 pathname 사용 (TossPayments redirect 대응: /payment/success 등)
        const p = window.location.pathname || '/';
        return p === '' ? '/' : p;
      };
      const [path, setPath] = useState(getPath);

      useEffect(() => {
        const handler = () => setPath(getPath());
        window.addEventListener('hashchange', handler);
        window.addEventListener('popstate', handler);
        return () => {
          window.removeEventListener('hashchange', handler);
          window.removeEventListener('popstate', handler);
        };
      }, []);

      const navigate = useCallback((to) => {
        // pathname 기반 진입 (예: /payment/success) 후 navigate를 부르면
        // hash 라우팅으로 자연스럽게 이동시키기 위해 pathname을 / 로 정리
        if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') {
          window.history.replaceState({}, '', '/' + (to.startsWith('#') ? to : '#' + to));
          // history.replaceState는 hashchange를 발생시키지 않으므로 수동 갱신
          setPath(to.replace(/^#/, '') || '/');
          return;
        }
        window.location.hash = to.startsWith('#') ? to : '#' + to;
      }, []);

      // 라우트 변경 시 스크롤 상단으로
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'instant' });
      }, [path]);

      return (
        <RouterContext.Provider value={{ path, navigate, params: {} }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function Routes({ children }) {
      const ctx = useContext(RouterContext);
      const routes = React.Children.toArray(children);
      for (const r of routes) {
        const params = matchRoute(r.props.path, ctx.path);
        if (params) {
          return (
            <RouterContext.Provider value={{ ...ctx, params }}>
              {r.props.element}
            </RouterContext.Provider>
          );
        }
      }
      // 매칭되는 라우트 없음 → 404
      return (
        <div className="max-w-3xl mx-auto p-12 text-center">
          <p className="text-6xl mb-4">🤔</p>
          <h1 className="text-2xl font-bold mb-2">페이지를 찾을 수 없어요</h1>
          <p className="text-slate-500 mb-6">경로: <code className="bg-slate-100 px-2 py-0.5 rounded">{ctx.path}</code></p>
          <Link to="/" className="inline-block"><Button>홈으로</Button></Link>
        </div>
      );
    }

    function Route() { return null; } // declarative marker

    function Link({ to, className = '', children, ...rest }) {
      return (

      const [pdfUrl, setPdfUrl] = useState(null);

        setPdfError('');
        setLoadingPdf(true);

          const data = await apiFetch(`/api/contents/${content.id}/pdf-url`);
          setPdfUrl(data.url);

    // ========================================
    // 📄 페이지 — 3) 결제 화면 (TossPayments 위젯 v2 실연동)
    // ========================================
    function CheckoutPage() {
      const { id } = useParams();
      const contentId = parseInt(id, 10);
      const content = CONTENTS.find((c) => c.id === contentId);
      const { user } = useAuth();
      const { isPurchased } = usePurchase();
      const { navigate } = useRouter();

      const [order, setOrder] = useState(null);     // { orderId, orderName, amount, customerKey }
      const [tossClientKey, setTossClientKey] = useState(null);
      const [widgets, setWidgets] = useState(null); // 토스 위젯 인스턴스
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const renderedRef = React.useRef(false);

      // ===== Hooks (early return 전 모두 호출) =====
      const purchased = content ? isPurchased(content.id) : false;
      const canFetch = !!user && !!content && !purchased;

      // 1) 클라이언트키 + 주문 생성 — 페이지 마운트 시 한 번
      useEffect(() => {
        if (!canFetch) return;
        let alive = true;
        (async () => {
          try {
            const cfg = await apiFetch('/api/config');
            if (!alive) return;
            setTossClientKey(cfg.tossClientKey);

            const o = await apiFetch('/api/orders', {
              method: 'POST',
              body: JSON.stringify({ contentId: content.id }),
            });
            if (!alive) return;
            setOrder(o);
          } catch (e) {
            if (alive) setError(e.message || '주문 생성에 실패했습니다.');
          }
        })();
        return () => { alive = false; };
      }, [canFetch, content && content.id]);

      // 2) 토스 위젯 초기화 + 렌더링 — 주문이 준비되면 한 번만
      useEffect(() => {
        if (!tossClientKey || !order) return;
        if (typeof window.TossPayments !== 'function') {
          setError('TossPayments SDK 로드 실패. 페이지를 새로고침해 주세요.');
          return;
        }
        let alive = true;
        (async () => {
          try {
            const tossPayments = window.TossPayments(tossClientKey);
            const w = tossPayments.widgets({ customerKey: order.customerKey });
            await w.setAmount({ currency: 'KRW', value: order.amount });

            if (!renderedRef.current) {
              await Promise.all([
                w.renderPaymentMethods({
                  selector: '#toss-payment-methods',
                  variantKey: 'DEFAULT',
                }),
                w.renderAgreement({
                  selector: '#toss-agreement',
                  variantKey: 'AGREEMENT',
                }),
              ]);
              renderedRef.current = true;
            }
            if (alive) setWidgets(w);
          } catch (e) {
            console.error('toss widget init failed:', e);
            if (alive) setError('결제 위젯을 불러올 수 없습니다: ' + (e.message || ''));
          }
        })();
        return () => { alive = false; };
      }, [tossClientKey, order]);

      // ===== 모든 hook 호출 후 early return =====
      if (!content) {
        return (
          <PageContainer>
            <Card className="p-10 text-center">
              <p>존재하지 않는 콘텐츠입니다.</p>
              <Link to="/" className="mt-4 inline-block"><Button>목록으로</Button></Link>
            </Card>
          </PageContainer>
        );
      }
      if (purchased) {
        return (
          <PageContainer>
            <Card className="p-10 text-center">
              <p className="text-4xl mb-3">✅</p>
              <p className="mb-4 text-slate-700">이미 구매한 콘텐츠입니다.</p>
              <Button onClick={() => navigate(`/content/${content.id}`)}>열람으로 이동</Button>
            </Card>
          </PageContainer>
        );
      }

      const handlePay = async () => {
        if (!user) {
          alert('로그인이 필요합니다.');
          navigate('/login');
          return;
        }
        if (!widgets || !order) return;
        setError('');
        setSubmitting(true);
        try {
          await widgets.requestPayment({
            orderId: order.orderId,
            orderName: order.orderName,
            successUrl: `${window.location.origin}/payment/success?contentId=${content.id}`,
            failUrl: `${window.location.origin}/payment/fail?contentId=${content.id}`,
            customerEmail: user.email,
            customerName: user.email.split('@')[0],
          });
          // requestPayment가 redirect를 일으키므로 아래는 보통 도달하지 않음
        } catch (e) {
          setSubmitting(false);
          if (e.code === 'USER_CANCEL') {
            // 사용자 취소 — 조용히 무시
            return;
          }
          setError(e.message || '결제 요청 중 오류가 발생했습니다.');
        }
      };

      return (
        <PageContainer>
          <div className="max-w-xl mx-auto">
            <Link to={`/content/${content.id}`} className="text-sm text-slate-500 hover:text-blue-600 mb-4 inline-block">
              ← 콘텐츠로 돌아가기
            </Link>

            <h1 className="text-2xl font-bold text-slate-900 mb-1">결제하기</h1>
            <p className="text-sm text-slate-500 mb-6">아래 콘텐츠의 잠금을 해제합니다.</p>

            {/* 주문 요약 */}
            <Card className="p-6 mb-5">
              <p className="text-xs text-slate-400 mb-2 font-medium">주문 요약</p>
              <div className="flex items-start gap-3 mb-4">
                <div className="w-12 h-12 rounded-lg bg-slate-100 flex items-center justify-center text-2xl flex-shrink-0">
                  📈
                </div>
                <div className="flex-1 min-w-0">
                  <CategoryBadge category={content.category} />
                  <h3 className="font-semibold text-slate-900 mt-1.5 leading-snug">
                    {content.title}
                  </h3>
                  <p className="text-xs text-slate-400 mt-1 font-mono">#{content.ticker}</p>
                </div>
              </div>
              <div className="border-t border-slate-100 pt-3 space-y-2 text-sm">
                <div className="flex justify-between text-slate-600">
                  <span>콘텐츠 가격</span>
                  <span>₩{content.price.toLocaleString('ko-KR')}</span>
                </div>
                <div className="flex justify-between text-slate-600">
                  <span>할인</span>
                  <span>₩0</span>
                </div>
                <div className="flex justify-between font-bold text-slate-900 pt-2 border-t border-slate-100 text-base">
                  <span>총 결제 금액</span>
                  <PriceTag price={content.price} className="text-lg" />
                </div>
              </div>
            </Card>

            {/* 구매자 정보 */}
            <Card className="p-6 mb-5">
              <p className="text-xs text-slate-400 mb-2 font-medium">구매자</p>
              {user ? (
                <div className="flex items-center justify-between">
                  <div>
                    <p className="font-medium text-slate-900">{user.email.split('@')[0]}</p>
                    <p className="text-sm text-slate-500">{user.email}</p>
                  </div>
                  <Badge className="bg-emerald-100 text-emerald-700 border-emerald-200">로그인됨</Badge>
                </div>
              ) : (
                <div className="flex items-center justify-between">
                  <p className="text-sm text-slate-500">로그인 후 결제 가능합니다.</p>
                  <Link to="/login"><Button size="sm" variant="secondary">로그인</Button></Link>
                </div>
              )}
            </Card>

            {!user ? (
              <Notice tone="warn">로그인이 필요합니다. 위 로그인 버튼을 눌러 로그인해 주세요.</Notice>
            ) : (
              <>
                {/* 토스 결제위젯 */}
                <Card className="p-4 mb-3">
                  <div id="toss-payment-methods" />
                </Card>
                <Card className="p-4 mb-5">
                  <div id="toss-agreement" />
                </Card>

                {error && (
                  <div className="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
                    {error}
                  </div>
                )}

                <Notice tone="info">
                  ℹ️ 토스 테스트 환경입니다. 실제 결제는 발생하지 않습니다.
                </Notice>

                {/* 결제 버튼 */}
                <div className="mt-5">
                  <Button
                    size="lg"
                    className="w-full toss-btn"
                    onClick={handlePay}
                    disabled={!widgets || submitting}
                  >
                    {submitting ? (
                      <><Spinner className="w-5 h-5" /> 결제창으로 이동 중…</>
                    ) : !widgets ? (
                      <><Spinner className="w-5 h-5" /> 결제위젯 준비 중…</>
                    ) : (
                      <>💳 ₩{content.price.toLocaleString('ko-KR')} 결제하기</>
                    )}
                  </Button>
                  <p className="text-xs text-slate-400 mt-3 text-center">
                    결제 완료 시 즉시 콘텐츠가 열람 가능합니다 · 영구 소장
                  </p>
                </div>
              </>
            )}
          </div>
        </PageContainer>
      );
    }

    // ========================================
    // 📄 페이지 — 3-2) 결제 성공
    // ========================================
    // TossPayments는 successUrl로 paymentKey/orderId/amount를 location.search에 붙여 redirect한다.
    // 해시 라우팅 환경에서도 successUrl을 별도 정적 경로(/payment/success)로 두면
    // location.search가 그대로 보존되므로 안전. 서버는 SPA 폴백으로 index.html을 서빙.
    function PaymentSuccessPage() {
      const { navigate } = useRouter();
      const { refresh } = usePurchase();
      const [status, setStatus] = useState('processing'); // processing | success | error
      const [error, setError] = useState('');
      const [contentId, setContentId] = useState(null);

      useEffect(() => {
        // location.search + hash 안의 query 둘 다 안전하게 파싱
        const params = parsePaymentRedirectParams();
        const paymentKey = params.get('paymentKey');
        const orderId = params.get('orderId');
        const amount = params.get('amount');
        const cidParam = params.get('contentId');

        if (!paymentKey || !orderId || !amount) {
          setStatus('error');
          setError('결제 정보가 올바르지 않습니다.');
          return;
        }

        (async () => {
          try {
            const data = await apiFetch('/api/payments/confirm', {
              method: 'POST',
              body: JSON.stringify({ paymentKey, orderId, amount: Number(amount) }),
            });
            setContentId(data.contentId || (cidParam ? Number(cidParam) : null));
            await refresh();
            // confirm 성공 후 URL에서 민감 파라미터 제거 (새로고침 시 재confirm 방지)
            try {
              window.history.replaceState({}, '', '/payment/success');
            } catch {}
            setStatus('success');
          } catch (e) {
            setStatus('error');
            setError(e.message || '결제 승인에 실패했습니다.');
          }
        })();
      }, []);

      return (
        <PageContainer>
          <div className="max-w-md mx-auto">
            <Card className="p-8 text-center">
              {status === 'processing' && (
                <>
                  <div className="flex justify-center mb-4 text-blue-600">
                    <Spinner className="w-10 h-10" />
                  </div>
                  <h1 className="text-xl font-bold text-slate-900 mb-2">결제 승인 중…</h1>
                  <p className="text-sm text-slate-500">잠시만 기다려 주세요.</p>
                </>
              )}
              {status === 'success' && (
                <>
                  <p className="text-5xl mb-3">✅</p>
                  <h1 className="text-2xl font-bold text-slate-900 mb-2">결제 완료</h1>
                  <p className="text-sm text-slate-500 mb-6">
                    콘텐츠 잠금이 해제되었습니다. 지금 바로 열람하실 수 있어요.
                  </p>
                  <div className="space-y-2">
                    {contentId && (
                      <Button
                        size="lg"
                        className="w-full"
                        onClick={() => navigate(`/content/${contentId}`)}
                      >
                        📖 콘텐츠 보러가기
                      </Button>
                    )}
                    <Button
                      size="md"
                      variant="secondary"
                      className="w-full"
                      onClick={() => navigate('/my-purchases')}
                    >
                      구매내역 보기
                    </Button>
                  </div>
                </>
              )}
              {status === 'error' && (
                <>
                  <p className="text-5xl mb-3">⚠️</p>
                  <h1 className="text-xl font-bold text-slate-900 mb-2">결제 승인 실패</h1>
                  <p className="text-sm text-rose-600 mb-5">{error}</p>
                  <Button onClick={() => navigate('/')} variant="secondary">
                    홈으로
                  </Button>
                </>
              )}
            </Card>
          </div>
        </PageContainer>
      );
    }

    // ========================================
    // 📄 페이지 — 3-3) 결제 실패
    // ========================================
    function PaymentFailPage() {
      const { navigate } = useRouter();
      const params = parsePaymentRedirectParams();
      const code = params.get('code');
      const message = params.get('message');
      const contentId = params.get('contentId');

      return (
        <PageContainer>
          <div className="max-w-md mx-auto">
            <Card className="p-8 text-center">
              <p className="text-5xl mb-3">😢</p>
              <h1 className="text-2xl font-bold text-slate-900 mb-2">결제가 완료되지 않았어요</h1>
              <div className="my-4 p-4 bg-slate-50 rounded-lg text-left text-sm text-slate-700">
                {code && <div className="mb-1"><span className="text-slate-500">에러 코드:</span> <code className="font-mono">{code}</code></div>}
                {message && <div><span className="text-slate-500">메시지:</span> {message}</div>}
                {!code && !message && <div className="text-slate-500">사용자가 결제를 취소했거나 결제창이 종료되었습니다.</div>}
              </div>
              <p className="text-xs text-slate-400 mb-5">결제 금액은 청구되지 않습니다. 다시 시도해 주세요.</p>
              <div className="space-y-2">
                {contentId && (
                  <Button
                    size="lg"
                    className="w-full"
                    onClick={() => navigate(`/checkout/${contentId}`)}
                  >
                    🔄 다시 결제하기
                  </Button>
                )}
                <Button variant="secondary" className="w-full" onClick={() => navigate('/')}>
                  홈으로
                </Button>
              </div>
            </Card>
          </div>
        </PageContainer>
      );
    }

    // 해시 라우팅과 토스 redirect의 충돌을 방어하는 query 파서.
    // location.search와 hash 안의 query string을 모두 병합해서 파싱한다.
    function parsePaymentRedirectParams() {
      const params = new URLSearchParams();
      // 1) location.search (TossPayments가 paymentKey/orderId/amount를 여기 붙임)
      try {
        const s = new URLSearchParams(window.location.search);
        s.forEach((v, k) => params.set(k, v));
      } catch {}
      // 2) hash 안의 query string (예: #/payment/success?paymentType=NORMAL)
      try {
        const h = window.location.hash || '';
        const idx = h.indexOf('?');
        if (idx !== -1) {
          const hs = new URLSearchParams(h.slice(idx + 1));
          hs.forEach((v, k) => params.set(k, v));
        }
      } catch {}
      return params;
    }

    // ========================================
    // 📄 페이지 — 4) 내 구매내역
    // ========================================
    function MyPurchasesPage() {
      const { user } = useAuth();
      const { purchases, refresh, loading } = usePurchase();
      const { navigate } = useRouter();

      const total = purchases.reduce((sum, p) => sum + (p.price || 0), 0);

      // 서버에서 받은 purchases는 이미 title/ticker/category를 포함.
      // 로컬 CONTENTS 더미가 있으면 보강용으로 우선, 없으면 서버 필드를 사용.
      const items = purchases
        .map((p) => {
          const local = CONTENTS.find((c) => c.id === p.contentId);
          const content = local || {
            id: p.contentId,
            title: p.title,
            ticker: p.ticker,
            category: p.category,
          };
          return { ...p, content };
        })
        .filter((x) => x.content && x.content.id)
        .sort((a, b) => String(b.purchasedAt || '').localeCompare(String(a.purchasedAt || '')));

      if (!user) {
        return (
          <PageContainer>
            <Card className="p-10 text-center">
              <p className="text-4xl mb-3">🔐</p>
              <h2 className="text-xl font-bold mb-2">로그인이 필요합니다</h2>
              <p className="text-slate-500 mb-5">구매내역을 보려면 로그인해 주세요.</p>
              <Link to="/login"><Button>로그인</Button></Link>
            </Card>
          </PageContainer>
        );
      }

      return (
        <PageContainer>
          <div className="flex items-end justify-between mb-6 flex-wrap gap-3">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">내 구매내역</h1>
              <p className="text-sm text-slate-500 mt-1">
                {user.email} · 총 {items.length}건 · 합계 ₩{total.toLocaleString('ko-KR')}
              </p>
            </div>
            <Button
              variant="ghost"
              size="sm"
              onClick={refresh}
              disabled={loading}
            >
              {loading ? <Spinner className="w-4 h-4" /> : '🔄'} 새로고침
            </Button>
          </div>

          {items.length === 0 ? (
            <Card className="p-12 text-center">
              <p className="text-4xl mb-3">🛒</p>
              <h2 className="text-lg font-semibold text-slate-900 mb-2">아직 구매한 콘텐츠가 없어요</h2>
              <p className="text-slate-500 mb-5">관심 종목 리포트의 잠금을 해제해 보세요.</p>
              <Link to="/"><Button>콘텐츠 둘러보기</Button></Link>
            </Card>
          ) : (
            <div className="space-y-3">
              {items.map((p) => (
                <Card key={p.orderId} className="p-4 sm:p-5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1">
                      <CategoryBadge category={p.content.category} />
                      <span className="text-xs text-slate-400 font-mono">#{p.content.ticker}</span>
                    </div>
                    <h3 className="font-semibold text-slate-900 leading-snug truncate">
                      {p.content.title}
                    </h3>
                    <div className="flex items-center gap-3 mt-1 text-xs text-slate-500">
                      <span>구매일 {String(p.purchasedAt || '').slice(0, 10)}</span>
                      {p.orderId && <><span>·</span><span className="font-mono truncate max-w-[180px]">{p.orderId}</span></>}
                    </div>
                  </div>
                  <div className="flex items-center gap-3 sm:flex-col sm:items-end justify-between">
                    <PriceTag price={p.price} />
                    <Button
                      size="sm"
                      variant="secondary"
                      onClick={() => navigate(`/content/${p.content.id}`)}
                    >
                      📖 다시 열람
                    </Button>
                  </div>
                </Card>
              ))}
            </div>
          )}
        </PageContainer>
      );
    }

    // ========================================
    // 📄 페이지 — 5) 로그인 / 회원가입 (실제 JWT 인증)
    // ========================================
    function LoginPage() {
      const { user, login, register } = useAuth();
      const { navigate } = useRouter();
      const [mode, setMode] = useState('login'); // 'login' | 'register'
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => {
        if (user) navigate('/');
      }, [user]);

      const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const PW_RE = /^\d{8}$/;

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!EMAIL_RE.test(email)) {
          setError('이메일 형식이 올바르지 않습니다.');
          return;
        }
        if (!PW_RE.test(password)) {
          setError('비밀번호는 숫자 8자리여야 합니다.');
          return;
        }
        setError('');
        setSubmitting(true);
        try {
          if (mode === 'login') await login(email, password);
          else await register(email, password);
          navigate('/');
        } catch (err) {
          setError(err.message || '요청 처리 중 오류가 발생했습니다.');
        } finally {
          setSubmitting(false);
        }
      };

      const isLogin = mode === 'login';

      return (
        <PageContainer>
          <div className="max-w-md mx-auto">
            <h1 className="text-2xl font-bold text-slate-900 mb-1">{isLogin ? '로그인' : '회원가입'}</h1>
            <p className="text-sm text-slate-500 mb-6">
              {isLogin ? '콘텐츠 구매 및 열람을 위해 로그인이 필요합니다.' : '이메일과 8자리 숫자 비밀번호로 가입하세요.'}
            </p>

            <Card className="p-6 sm:p-8">
              <div className="flex gap-2 mb-5 p-1 bg-slate-100 rounded-lg">
                <button
                  type="button"
                  onClick={() => { setMode('login'); setError(''); }}
                  className={`flex-1 py-2 text-sm font-medium rounded-md transition ${isLogin ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`}
                >
                  로그인
                </button>
                <button
                  type="button"
                  onClick={() => { setMode('register'); setError(''); }}
                  className={`flex-1 py-2 text-sm font-medium rounded-md transition ${!isLogin ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`}
                >
                  회원가입
                </button>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                <Input
                  type="email"
                  label="이메일"
                  placeholder="you@example.com"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  required
                  autoComplete="email"
                />
                <Input
                  type="password"
                  label="비밀번호 (숫자 8자리)"
                  placeholder="12345678"
                  value={password}
                  onChange={(e) => setPassword(e.target.value.replace(/\D/g, '').slice(0, 8))}
                  required
                  inputMode="numeric"
                  pattern="\d{8}"
                  maxLength={8}
                  autoComplete={isLogin ? 'current-password' : 'new-password'}
                />
                {error && (
                  <p className="text-sm text-rose-600">{error}</p>
                )}
                <Button type="submit" size="lg" className="w-full" disabled={submitting}>
                  {submitting ? '처리 중...' : (isLogin ? '로그인' : '회원가입')}
                </Button>
              </form>
              <div className="mt-5 pt-5 border-t border-slate-100 text-xs text-slate-400 text-center">
                JWT 기반 자체 인증 · 비밀번호 형식: 숫자 8자리
              </div>
            </Card>
          </div>
        </PageContainer>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return (
        <AuthProvider>
          <PurchaseProvider>
            <Router>
              <div className="min-h-screen flex flex-col">
                <Header />
                <div className="flex-1">
                  <Routes>
                    <Route path="/" element={<HomePage />} />
                    <Route path="/content/:id" element={<ContentDetailPage />} />
                    <Route path="/checkout/:id" element={<CheckoutPage />} />
                    <Route path="/payment/success" element={<PaymentSuccessPage />} />
                    <Route path="/payment/fail" element={<PaymentFailPage />} />
                    <Route path="/my-purchases" element={<MyPurchasesPage />} />
                    <Route path="/login" element={<LoginPage />} />
                  </Routes>
                </div>
                <Footer />
              </div>
            </Router>
          </PurchaseProvider>
        </AuthProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
